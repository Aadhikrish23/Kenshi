version: "3.9"

services:
  postgres:
    image: postgres:12
    container_name: nakama-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports: 
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.20.0
    container_name: nakama-server
    depends_on:
      postgres:
        condition: service_healthy
      nakama-migrate:
        condition: service_completed_successfully
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./nakama/modules:/nakama/data/modules
    entrypoint:
      - "/nakama/nakama"
    command:
      - "--name"
      - "nakama1"
      - "--database.address"
      - "postgres:localdb@postgres:5432/nakama"
      - "--logger.level"
      - "DEBUG"
      - "--session.token_expiry_sec"
      - "7200"
  nakama-migrate:
    image: heroiclabs/nakama:3.20.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/nakama/nakama"
    command:
      - "migrate"
      - "up"
      - "--database.address"
      - "postgres:localdb@postgres:5432/nakama"