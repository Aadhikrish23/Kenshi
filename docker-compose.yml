version: "3.9"

services:
  postgres:
    image: postgres:12
    container_name: nakama-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: nakama-server
    depends_on:
      postgres:
        condition: service_healthy
      nakama-migrate:
        condition: service_completed_successfully
    ports:
      - "${NAKAMA_PORT}:7350"
      - "${NAKAMA_HTTP_PORT}:7351"
    volumes:
      - ./nakama/modules:/nakama/data/modules
    env_file:
      - .env
    command:
      - "--name"
      - "nakama1"
      - "--database.address"
      - "${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
      - "--session.encryption_key"
      - "${NAKAMA_SESSION_KEY}"
      - "--socket.server_key"
      - "${NAKAMA_SERVER_KEY}"
      - "--runtime.js_entrypoint"
      - "match.js"
      - "--logger.level"
      - "DEBUG"

  nakama-migrate:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command:
      - "migrate"
      - "up"
      - "--database.address"
      - "${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"